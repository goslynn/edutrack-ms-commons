# =============================================================================
# edutrack-ms-commons -- propiedades custom expuestas por la librerï¿½a
# =============================================================================
# Este archivo NO es cargado por Quarkus: vive fuera de src/main/resources/ y
# usa la extensiï¿½n .example justamente para que el classpath lo ignore. Sirve
# como referencia de las propiedades de dominio que el cï¿½digo de esta librerï¿½a
# lee vï¿½a @ConfigProperty. Cada MS consumidor copia las que necesite en su
# propio src/main/resources/application.properties.
# =============================================================================


# -----------------------------------------------------------------------------
# infrastructure.context -- intï¿½rprete de cabeceras internas del API Gateway
# -----------------------------------------------------------------------------
# Modo de validaciï¿½n cuando una cabecera X-... llega presente pero malformada.
#   EAGER (default) -> aborta la request con 400 Bad Request.
#   WARN            -> loguea una advertencia y trata la cabecera como ausente,
#                      dejando pasar la request.
# Una cabecera ausente nunca es fallo de validaciï¿½n en ningï¿½n modo.
# Lee: cl.duocuc.edutrack.ms.infrastructure.context.RequestContext
edutrack.headers.validation.mode=EAGER


# -----------------------------------------------------------------------------
# infrastructure.exception -- handler global de errores
# -----------------------------------------------------------------------------
# Si es true, ErrorResponse incluye el campo `trace` con el stacktrace
# completo en la respuesta JSON. ï¿½til en dev; mantener false en producciï¿½n
# para no filtrar paquetes/clases internas ni inflar el body.
# Lee: cl.duocuc.edutrack.ms.infrastructure.exception.GlobalExceptionMappers
edutrack.errors.expose-stacktrace=false


# -----------------------------------------------------------------------------
# infrastructure.discovery -- service discovery inter-servicio (Stork + Consul)
# -----------------------------------------------------------------------------
# Toda comunicacion HTTP entre microservicios de EduTrack se hace via Stork
# sobre Consul: el cliente REST apunta a stork://<service-id> y Stork resuelve
# la(s) instancia(s) en runtime contra Consul. Los service-ids estan declarados
# como constantes en infrastructure.discovery.ServiceIds.
#
# Cada MS consumidor declara, por cada servicio destino, el bloque
# quarkus.stork.<service-id>.* y la url stork://<service-id> en el REST Client.
#
# Lee: cl.duocuc.edutrack.ms.infrastructure.discovery (package-info)
#
# --- bloque por servicio destino (ejemplo: Auth Service) ---
quarkus.stork.edutrack-auth.service-discovery.type=consul
quarkus.stork.edutrack-auth.service-discovery.consul-host=${CONSUL_HOST:consul.internal}
quarkus.stork.edutrack-auth.service-discovery.consul-port=${CONSUL_PORT:8500}
quarkus.stork.edutrack-auth.load-balancer.type=round-robin


# -----------------------------------------------------------------------------
# infrastructure.context -- resolutor de superusuario via Auth Service
# -----------------------------------------------------------------------------
# REST Client AuthAccessClient (usado por la impl por defecto de
# SuperUserResolver: RemoteSuperUserResolver). Apunta al service-id Stork del
# Auth Service. El recurso /auth/access se invoca como
# GET /auth/access?resourceUuid=ALL&permission=EXECUTE y se chequea
# (effectiveFlags & 7) == 7 para decidir si el usuario es super.
#
# Esta propiedad SOLO es necesaria cuando el microservicio consume la impl por
# defecto. Servicios que aportan su propia implementacion de SuperUserResolver
# (caso del propio Auth Service) no inyectan el REST Client y pueden omitirla.
# Lee: cl.duocuc.edutrack.ms.infrastructure.context.AuthAccessClient
quarkus.rest-client.edutrack-auth-access.url=stork://edutrack-auth
