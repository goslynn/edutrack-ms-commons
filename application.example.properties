# =============================================================================
# edutrack-ms-commons -- propiedades custom expuestas por la librería
# =============================================================================
# Este archivo NO es cargado por Quarkus: vive fuera de src/main/resources/ y
# usa la extensión .example justamente para que el classpath lo ignore. Sirve
# como referencia de las propiedades de dominio que el código de esta librería
# lee vía @ConfigProperty. Cada MS consumidor copia las que necesite en su
# propio src/main/resources/application.properties.
# =============================================================================


# -----------------------------------------------------------------------------
# infrastructure.context -- intérprete de cabeceras internas del API Gateway
# -----------------------------------------------------------------------------
# Modo de validación cuando una cabecera X-... llega presente pero malformada.
#   EAGER (default) -> aborta la request con 400 Bad Request.
#   WARN            -> loguea una advertencia y trata la cabecera como ausente,
#                      dejando pasar la request.
# Una cabecera ausente nunca es fallo de validación en ningún modo.
# Lee: cl.duocuc.edutrack.ms.infrastructure.context.RequestContext
edutrack.headers.validation.mode=EAGER


# -----------------------------------------------------------------------------
# infrastructure.exception -- handler global de errores
# -----------------------------------------------------------------------------
# Si es true, ErrorResponse incluye el campo `trace` con el stacktrace
# completo en la respuesta JSON. Útil en dev; mantener false en producción
# para no filtrar paquetes/clases internas ni inflar el body.
# Lee: cl.duocuc.edutrack.ms.infrastructure.exception.GlobalExceptionMappers
edutrack.errors.expose-stacktrace=false
