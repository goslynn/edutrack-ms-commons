# =============================================================================
# edutrack-ms-commons -- defaults globales transversales a todos los MS
# =============================================================================
# MicroProfile Config carga este archivo automaticamente desde el classpath de
# la libreria. Su prioridad es menor que el application.properties de cada MS,
# de modo que cualquier MS puede sobreescribir cualquier valor declarado aqui.
#
# Estos defaults existen para que un MS consumidor NO tenga que repetir el
# bloque Stork por cada servicio destino. La unica configuracion que un MS
# necesita aportar es donde encontrar Consul (edutrack.consul.host/port) si los
# defaults no aplican a su ambiente.
# =============================================================================


# -----------------------------------------------------------------------------
# Service discovery: Consul (host/puerto compartidos)
# -----------------------------------------------------------------------------
# Sobreescribir SOLO si el ambiente del MS necesita otro endpoint de Consul.
edutrack.consul.host=consul.internal
edutrack.consul.port=8500


# -----------------------------------------------------------------------------
# Stork: catalogo precanned por service-id de EduTrack
# -----------------------------------------------------------------------------
# Toda referencia a host/puerto resuelve a edutrack.consul.host/port mediante
# expansion de propiedades de MP Config; sustituir esos dos basta para mover
# todo el catalogo a otro Consul. Los nombres provienen de
# cl.duocuc.edutrack.ms.infrastructure.discovery.ServiceIds.

quarkus.stork.edutrack-auth.service-discovery.type=consul
quarkus.stork.edutrack-auth.service-discovery.consul-host=${edutrack.consul.host}
quarkus.stork.edutrack-auth.service-discovery.consul-port=${edutrack.consul.port}

