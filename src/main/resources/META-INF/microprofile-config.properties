# =============================================================================
# edutrack-ms-commons -- defaults globales transversales a todos los MS
# =============================================================================
# MicroProfile Config carga este archivo automaticamente desde el classpath de
# la libreria. Su prioridad es menor que el application.properties de cada MS,
# de modo que cualquier MS puede sobreescribir cualquier valor declarado aqui.
# =============================================================================


# -----------------------------------------------------------------------------
# Service discovery: DNS privado de Fly.io (sin registry)
# -----------------------------------------------------------------------------
# No hay Consul ni Stork: cada microservicio es resolvible por DNS dentro de la
# red 6PN privada de la organizacion en Fly.io como <app>.fly.internal. El
# nombre de app sigue el contrato del gateway: edutrack-<service>, donde
# <service> es el nombre logico bare del catalogo
# cl.duocuc.edutrack.ms.infrastructure.discovery.ServiceIds.
#
# DiscoveryConfigSourceFactory sustituye el placeholder {service} en el patron
# de abajo por cada id de ServiceIds y materializa la propiedad
#   quarkus.rest-client.<service>.url
# que consume cada REST Client declarativo (@RegisterRestClient(configKey=...)).
# El patron es el espejo exacto del UPSTREAM_HOST_PATTERN del gateway
# nginx/OpenResty y la UNICA fuente de verdad del host destino: NO declarar
# quarkus.rest-client.<x>.url a mano salvo que un servicio viva en un host
# especial (ese override puntual gana, ordinal 250 > 150).
#
# Estos son los dos unicos knobs de discovery:
#   - edutrack.discovery.scheme  : http | https  (cambia el protocolo de TODAS
#                                   las llamadas inter-servicio de una vez).
#   - edutrack.discovery.pattern : template de host con placeholder {service}.
#
# Override local (docker-compose, donde el contenedor se llama "auth", no
# "edutrack-auth") en el application.properties del MS consumidor. La resolucion
# del factory es profile-aware, asi que basta el prefijo de perfil:
#   %dev.edutrack.discovery.pattern={service}:8080
# Ejemplos de otros entornos:
#   %prod.edutrack.discovery.scheme=https
#   %staging.edutrack.discovery.pattern=edutrack-{service}.staging.fly.internal:8080
edutrack.discovery.scheme=http
edutrack.discovery.pattern=edutrack-{service}.fly.internal:8080
